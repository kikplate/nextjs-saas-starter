name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  next:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/app?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: install and verify
        run: |
          npm ci
          npx prisma migrate deploy
          npm run lint
          npm run test
          npm run build
